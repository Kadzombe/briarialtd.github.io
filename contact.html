<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="">
        <meta name="author" content="">

        <title>BriAria</title>

        <!-- CSS FILES -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,200;0,400;0,700;1,200&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="css/bootstrap-icons.css" rel="stylesheet">
        <link href="css/tooplate-kool-form-pack.css" rel="stylesheet">

        <style>
          /* Extra success/error styles */
          .success-message {
            display: none;
            text-align: center;
            color: green;
            margin-top: 15px;
            font-weight: bold;
          }
          .error-message {
            display: none;
            text-align: center;
            color: red;
            margin-top: 15px;
            font-weight: bold;
          }
        </style>
    </head>

    <body>

        <main>

            <!-- ✅ Your existing header/nav kept -->
            <header class="site-header">
                ...
            </header>

            <!-- ✅ Your contact form -->
            <section class="hero-section d-flex justify-content-center align-items-center">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-6 col-12 mx-auto">
                            <form id="contactForm" class="custom-form contact-form" role="form">
                                <h2 class="hero-title text-center mb-4 pb-2">Contact Form</h2>

                                <div class="row">
                                    <div class="col-lg-6 col-md-6 col-12">
                                        <div class="form-floating">
                                            <input type="text" name="full-name" id="full-name" class="form-control" placeholder="Full Name" required="">
                                            <label for="full-name">Full Name</label>
                                        </div>
                                    </div>

                                    <div class="col-lg-6 col-md-6 col-12">
                                        <div class="form-floating mb-4 p-0">
                                            <input type="email" name="email" id="email" pattern="[^ @]*@[^ @]*" class="form-control" placeholder="Email address" required="">
                                            <label for="email">Email address</label>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-12">
                                        <div class="form-floating">
                                            <textarea class="form-control" id="message" name="message" placeholder="Message"></textarea>
                                            <label for="message">Message</label>
                                        </div>
                                    </div>

                                    <div class="col-lg-6 col-10 mx-auto">
                                        <button type="submit" class="form-control">Send Message</button>
                                    </div>
                                </div>
                            </form>

                            <!-- ✅ Success/Error feedback -->
                            <p class="success-message" id="successMessage">✅ Your message has been sent!</p>
                            <p class="error-message" id="errorMessage">❌ Something went wrong. Please try again.</p>

                        </div>
                    </div>
                </div>

                <div class="video-wrap">
                    <video autoplay="" loop="" muted="" class="custom-video" poster="">
                        <source src="videos/videow.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </section>

            <div class="logo-overlay">
                <img src="images/briArialog.jpg" alt="">
            </div>
        </main>

        <!-- JAVASCRIPT FILES -->
        <script src="js/jquery.min.js"></script>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/countdown.js"></script>
        <script src="js/init.js"></script>

        <!-- ✅ Firebase SDKs -->
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

        <script>
          // ✅ Your Firebase Config
          const firebaseConfig = {
            apiKey: "AIzaSyC2kcz9hqAs3Z98OxKzcgflj3QbgrD_uW4",
            authDomain: "briaria-ltd.firebaseapp.com",
            projectId: "briaria-ltd",
            storageBucket: "briaria-ltd.firebasestorage.app",
            messagingSenderId: "329304174989",
            appId: "1:329304174989:web:71647e9e6ae6be0175cdc4",
            measurementId: "G-GZHEHG3DDV"
          };

          // ✅ Init Firebase
          const app = firebase.initializeApp(firebaseConfig);
          const analytics = firebase.analytics(app);
          const db = firebase.firestore(app);

          // ✅ Handle form submit
          document.getElementById("contactForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = document.getElementById("full-name").value;
            const email = document.getElementById("email").value;
            const message = document.getElementById("message").value;

            try {
              await db.collection("messages").add({
                name,
                email,
                message,
                timestamp: new Date()
              });

              document.getElementById("successMessage").style.display = "block";
              document.getElementById("errorMessage").style.display = "none";
              document.getElementById("contactForm").reset();
            } catch (error) {
              console.error("Error saving message:", error);
              document.getElementById("errorMessage").style.display = "block";
              document.getElementById("successMessage").style.display = "none";
            }
          });
        </script>

        <footer class="text-center mt-4">
          © 2025 BriAria. All rights reserved. Address: 11929 182-184 High Street North East Ham, London, UK.
        </footer>
    </body>
</html>
