        <link href="css/bootstrap.min.css" rel="stylesheet">
        <link href="css/bootstrap-icons.css" rel="stylesheet">
        <link href="css/tooplate-kool-form-pack.css" rel="stylesheet">
    </head>

    <body>
        <main>
            <header class="site-header">
                <div class="container">
                    <div class="row justify-content-between">
                        <div class="col-lg-12 col-12 d-flex">
                            <a class="site-header-text d-flex justify-content-center align-items-center me-auto" href="index.html">
                                <i class="bi-"></i>
                                <span>BriAria LTD</span>
                            </a>
                            <ul class="social-icon d-flex justify-content-center align-items-center mx-auto">
                                <span class="text-white me-4 d-none d-lg-block">Stay connected</span>
                                <li class="social-icon-item"><a href="https://instagram.com/briarialtd" class="social-icon-link bi-instagram"></a></li>
                                <li class="social-icon-item"><a href="https://facebook.com/briarialtd" class="social-icon-link bi-facebook"></a></li>
                                <li class="social-icon-item"><a href="https://x.com/briarialtd" class="social-icon-link bi-twitter"></a></li>
                                <li class="social-icon-item"><a href="https://wa.me/1234567890?text=Hello!%20I%20want%20to%20chat%20with%20you" class="social-icon-link bi-whatsapp"></a></li>
                            </ul>
                            <div>
                                <a href="#" class="custom-btn custom-border-btn btn" data-bs-toggle="modal" data-bs-target="#subscribeModal">Notify me
                                    <i class="bi-arrow-right ms-2"></i>
                                </a>
                            </div>
                            <a class="bi-list offcanvas-icon" data-bs-toggle="offcanvas" href="#offcanvasMenu" role="button" aria-controls="offcanvasMenu"></a>
                        </div>
                    </div>
                </div>
            </header>

            <div class="offcanvas offcanvas-end" data-bs-scroll="true" tabindex="-1" id="offcanvasMenu" aria-labelledby="offcanvasMenuLabel">
                <div class="offcanvas-header">
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body d-flex flex-column justify-content-center align-items-center">
                    <nav>
                        <ul>
                            <li><a href="login.html">Login Form</a></li>
                            <li><a href="register.html">Create an account</a></li>
                            <li><a href="about-us.html">About US</a></li>
                            <li><a href="services.html">Services</a></li>
                            <li><a class="active" href="contact.html">Contact Form</a></li>
                        </ul>
                    </nav>
                </div>
            </div>

            <div class="modal fade" id="subscribeModal" tabindex="-1" aria-labelledby="subscribeModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                    <div class="modal-content">
                        <div class="modal-header">
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <form action="#" method="get" class="custom-form mt-lg-4 mt-2" role="form">
                                <h2 class="modal-title" id="subscribeModalLabel">Stay up to date</h2>
                                <input type="email" name="email" id="email" pattern="[^ @]*@[^ @]*" class="form-control" placeholder="your@email.com" required="">
                                <button type="submit" class="form-control">Notify</button>
                            </form>
                        </div>
                        <div class="modal-footer justify-content-center">
                            <p>By signing up, you agree to our Privacy Notice</p>
                        </div>
                    </div>
                </div>
            </div>

            <section class="hero-section d-flex justify-content-center align-items-center">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-6 col-12 mx-auto">
                            <form id="contactForm" class="custom-form contact-form" role="form" method="post">
                                <h2 class="hero-title text-center mb-4 pb-2">Contact Form</h2>
                                <div class="row">
                                    <div class="col-lg-6 col-md-6 col-12">
                                        <div class="form-floating">
                                            <input type="text" name="name" id="name" class="form-control" placeholder="Full Name" required="">
                                            <label for="name">Full Name</label>
                                        </div>
                                    </div>
                                    <div class="col-lg-6 col-md-6 col-12">
                                        <div class="form-floating mb-4 p-0">
                                            <input type="email" name="email" id="email" pattern="[^ @]*@[^ @]*" class="form-control" placeholder="Email address" required="">
                                            <label for="email">Email address</label>
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-12">
                                        <div class="form-floating">
                                            <textarea class="form-control" id="message" name="message" placeholder="Message"></textarea>
                                            <label for="message">Message</label>
                                        </div>
                                    </div>
                                    <div class="col-lg-6 col-10 mx-auto">
                                        <button type="submit" class="form-control">Send Message</button>
                                    </div>
                                </div>
                            </form>
                            <p id="form-status" class="mt-3 text-center"></p>
                        </div>
                    </div>
                </div>
                <div class="video-wrap">
                    <video autoplay="" loop="" muted="" class="custom-video" poster="">
                        <source src="videos/videow.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </section>
            <div class="logo-overlay">
                <img src="images/briArialog.jpg" alt="">
            </div>
        </main>

        <!-- JAVASCRIPT FILES -->
        <script src="js/jquery.min.js"></script>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/countdown.js"></script>
        <script src="js/init.js"></script>

        <!-- Firebase SDKs -->
        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
            import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

            const firebaseConfig = {
                apiKey: "AIzaSyC2kcz9hqAs3Z98OxKzcgflj3QbgrD_uW4",
                authDomain: "briaria-ltd.firebaseapp.com",
                projectId: "briaria-ltd",
                storageBucket: "briaria-ltd.firebasestorage.app",
                messagingSenderId: "329304174989",
                appId: "1:329304174989:web:71647e9e6ae6be0175cdc4",
                measurementId: "G-GZHEHG3DDV"
            };

            // Init Firebase
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);

            // Handle form submit
            document.getElementById("contactForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                // Get values
                const name = document.getElementById("name").value;
                const email = document.getElementById("email").value;
                const message = document.getElementById("message").value;

                try {
                    await addDoc(collection(db, "messages"), {
                        name,
                        email,
                        message,
                        timestamp: new Date()
                    });

                    // Show success
                    document.getElementById("form-status").textContent = "✅ Message has been sent!";
                    document.getElementById("form-status").style.color = "green";

                    // Reset form
                    document.getElementById("contactForm").reset();

                } catch (error) {
                    console.error("Error sending message:", error);
                    document.getElementById("form-status").textContent = "❌ Something went wrong. Please try again.";
                    document.getElementById("form-status").style.color = "red";
                }
            });
        </script>

    </body>
</html>
